<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        h1 {
            margin-bottom: 10px;
            color: #333;
        }
        p {
            margin-bottom: 20px;
            text-align: center;
            color: #666;
            max-width: 600px;
        }
        canvas {
            border: 5px solid #8B4513;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #score, #level {
            font-size: 24px;
            margin-top: 10px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Snake Game</h1>
    <p>Use arrow keys to move the snake. Eat the red food to grow, score points, and advance levels. Avoid gray obstacles and your own body!</p>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
    <script src="snake.js"></script>
</body>
</html>
